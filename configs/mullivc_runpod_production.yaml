# Runpod production-oriented configuration for a real full-stream training run.
data:
  libritts_path: "data/libritts"
  fongbe_path: "data/fongbe"
  use_streaming: true
  libritts_config: "clean"
  libritts_train_split: "train.clean.360"
  libritts_validation_split: "dev.clean"
  fongbe_configs:
    - female
    - male
  fongbe_train_split: "train"
  fongbe_validation_split: "test"
  # Pre-download 30k samples once into memory at train startup to eliminate
  # any network bottleneck during training. Divided across 3 sources ~= 10k
  # libritts + all available fongbe male/female, giving a balanced bilingual pool.
  max_train_samples: 30000
  max_validation_samples: 1024

  sample_rate: 22050
  hop_length: 256
  win_length: 1024
  n_mel_channels: 80
  mel_fmin: 0
  mel_fmax: 8000

  # Shortening to 5 s clips + bs=8 is the configuration verified to fit on
  # H200 (~35 GB peak) with cycle consistency + ASR content-preservation
  # loss enabled. Voice conversion learns per-frame timbre->mel mapping so
  # long temporal context adds cost without quality.
  max_audio_length: 5.0
  min_audio_length: 1.0

  # With only Stage 2 running HiFi-GAN with grad and max_audio_length=5s,
  # bs=8 uses ~35 GB steady-state on H200. bs=16 OOMs at backward recompute
  # due to fragmentation.
  batch_size: 8
  num_workers: 4
  pin_memory: true

vocoder:
  backend: "speechbrain_hifigan"
  source: "speechbrain/tts-hifigan-libritts-22050Hz"
  cache_dir: "pretrained_models"
  fallback_to_griffin_lim: false

model:
  content_encoder:
    model_name: "microsoft/wavlm-base"
    hidden_size: 768
    output_dim: 256

  timbre_encoder:
    input_dim: 80
    hidden_dim: 256
    output_dim: 256
    num_layers: 4

  conformer:
    input_dim: 256
    num_heads: 8
    num_layers: 6
    conv_kernel_size: 31
    dropout: 0.1

  mel_decoder:
    input_dim: 512
    hidden_dim: 512
    output_dim: 80
    num_layers: 4

  discriminator:
    input_dim: 80
    hidden_dim: 512
    num_layers: 4
    patch_size: 16

training:
  learning_rate: 1e-4
  learning_rate_d: 2e-5
  beta1: 0.5
  beta2: 0.999
  weight_decay: 1e-6

  lambda_adv: 1.0
  lambda_rec: 1.0
  lambda_timbre: 0.5
  # Pitch loss disabled: the model has no pitch head, so there is no
  # predicted_pitch to supervise. Re-enable once a pitch predictor is added.
  lambda_pitch: 0.0
  lambda_asr: 0.5
  gan_mode: "hinge"

  # v10 ran 30 epochs; G_Loss converged ~ epoch 10. With the fixed losses
  # (ASR content-preservation, timbre, pitch all active), 10 epochs at
  # 1500 steps each is the budget target: ~25-30 h wall clock on H200.
  num_epochs: 10
  steps_per_epoch: 1500
  validation_steps: 64
  save_interval: 1
  # Save a checkpoint every N training steps so an OOM/crash late in an
  # epoch doesn't lose hours of progress.
  mid_epoch_save_interval: 500
  log_interval: 25
  enable_cycle_consistency: true

  lr_scheduler: "cosine"
  warmup_steps: 1000
  gradient_clip_norm: 1.0
  amp: true
  amp_dtype: "bfloat16"

paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  eval_dir: "evaluation"
  pretrained_dir: "pretrained_models"