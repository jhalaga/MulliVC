# MulliVC configuration
data:
  # Dataset paths
  libritts_path: "data/libritts"
  fongbe_path: "data/fongbe"
  use_streaming: true
  libritts_config: "clean"
  libritts_train_split: "train.clean.360"
  libritts_validation_split: "dev.clean"
  fongbe_configs:
    - female
    - male
  fongbe_train_split: "train"
  fongbe_validation_split: "test"
  max_train_samples: 2000
  max_validation_samples: 256
  
  # Audio parameters
  sample_rate: 22050
  hop_length: 256
  win_length: 1024
  n_mel_channels: 80
  mel_fmin: 0
  mel_fmax: 8000
  
  # Preprocessing parameters
  max_audio_length: 10.0  # seconds
  min_audio_length: 1.0   # seconds
  
  # Batch size and dataloader
  batch_size: 8
  num_workers: 4
  pin_memory: true

vocoder:
  backend: "speechbrain_hifigan"
  source: "speechbrain/tts-hifigan-libritts-22050Hz"
  cache_dir: "pretrained_models"
  fallback_to_griffin_lim: false

model:
  # Content Encoder
  content_encoder:
    model_name: "microsoft/wavlm-base"
    hidden_size: 768
    output_dim: 256
  
  # Timbre Encoder
  timbre_encoder:
    input_dim: 80  # mel channels
    hidden_dim: 256
    output_dim: 256
    num_layers: 4
  
  # Fine-grained Timbre Conformer
  conformer:
    input_dim: 256
    num_heads: 8
    num_layers: 6
    conv_kernel_size: 31
    dropout: 0.1
  
  # Mel Decoder
  mel_decoder:
    input_dim: 512  # content + timbre
    hidden_dim: 512
    output_dim: 80
    num_layers: 4
  
  # Discriminator
  discriminator:
    input_dim: 80
    hidden_dim: 512
    num_layers: 4
    patch_size: 16

training:
  # Hyperparameters
  learning_rate: 1e-4
  beta1: 0.5
  beta2: 0.999
  weight_decay: 1e-6
  
  # Loss weights
  lambda_adv: 0.05
  lambda_rec: 1.0
  lambda_timbre: 0.1
  lambda_pitch: 1.0
  lambda_asr: 0.5
  
  # Training
  num_epochs: 100
  steps_per_epoch: 1000
  validation_steps: 32
  save_interval: 10
  log_interval: 100
  enable_cycle_consistency: true
  
  # Optimizers
  lr_scheduler: "cosine"
  warmup_steps: 1000

# Paths
paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  eval_dir: "evaluation"
  pretrained_dir: "pretrained_models"
